<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.12/css/all.css">
    <link rel="stylesheet" type="text/CSS" href="stylesheets\main-styles.css">
    <title>App Academy Times</title>
</head>
<body>
    <header>
        <div class="masthead">
            <div class="menu-search">
                <div class="clickable-icons">
                <i class="fa fa-bars"></i>
                </div>
                <div class="clickable-icons">
                    <i class="fa fa-search"></i>
                </div>
            </div>
            <div class="action-buttons">
                <button>Subscribe Now</button>
                <button>Log In</button>
                <div class="clickable-icons">
                    <i class="fas fa-cog"></i>
                </div>
            </div>
            <div class="programming-languages">
                <div class="tech-stack">
                    <span>CSS</span>
                    <span>HTML</span>
                    <span>JavaScript</span>
                    <span>Python</span>
                </div>
            </div>
            <div class="dates">Tuesday, October 31, 2020</div>
            <div class="logo">
                <img src="images\AA_Times_Logo.png" alt="App Academy Logo">
            </div>
            <div class="today-paper"><i class="far fa-newspaper"></i> Today's Paper</div>
        </div>
    </header>
    <main></main>
    <footer></footer>
    
</body>
<footer></footer>
</html>
